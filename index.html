<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans select-none overflow-x-hidden">

  <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white sticky top-0 z-40 shadow-md px-4 pt-4 pb-4 rounded-b-2xl">
    <div class="flex justify-between items-center max-w-md mx-auto">
      <div>
        <h1 class="text-xl font-black tracking-tight">家計簿</h1>
        <div class="flex items-center space-x-2 mt-0.5">
          <button onclick="switchView('last')" id="btn-prev" class="text-blue-200 hover:text-white text-xs font-bold transition-colors">◀ 先月</button>
          <span id="app-month" class="text-xs text-white font-black bg-white/20 px-2.5 py-0.5 rounded-full">読み込み中...</span>
          <button onclick="switchView('current')" id="btn-next" class="text-blue-200 hover:text-white text-xs font-bold transition-colors opacity-40">今月 ▶</button>
        </div>
      </div>
      <button onclick="fetchData()" class="p-2 bg-white/20 rounded-xl active:scale-95 transition-transform" aria-label="更新">
        🔄
      </button>
    </div>
  </header>

  <main id="swipe-area" class="max-w-md mx-auto p-4 space-y-4 min-h-[calc(100vh-80px)] pb-24">

    <div id="loading" class="text-center py-12 text-slate-400 font-medium animate-pulse">
      データを取得しています...
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl text-sm font-semibold shadow-sm text-center"></div>

    <div id="summary-card" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
      <h2 id="summary-title" class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">今月の残り予算</h2>
      <div id="remaining-budget" class="text-3xl font-black tracking-tight text-slate-900 transition-colors">0 VND</div>
      <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-50">
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">総予算</span>
          <span id="total-budget" class="text-base font-extrabold text-slate-700">0</span>
        </div>
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">実支出</span>
          <span id="total-actual" class="text-base font-extrabold text-slate-700">0</span>
        </div>
      </div>
    </div>

    <div id="category-list" class="space-y-3"></div>

  </main>

  <div class="fixed bottom-6 right-6 z-40">
    <button onclick="triggerCamera()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-4 rounded-full shadow-xl active:scale-95 hover:shadow-2xl transition-all font-black text-sm tracking-wide flex items-center space-x-2">
      <span class="text-lg">📸</span>
      <span>レシートをスキャン</span>
    </button>
    <input type="file" id="camera-input" accept="image/*" multiple class="hidden" onchange="handleImagesSelected(event)">
  </div>

  <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div onclick="closeModal()" class="fixed inset-0 bg-black/60 backdrop-blur-xs"></div>
    <div class="relative bg-white w-full sm:max-w-md h-[80vh] sm:h-[70vh] sm:rounded-2xl rounded-t-2xl shadow-xl flex flex-col overflow-hidden animate-slide-up sm:animate-fade-in">
      <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <div>
          <h3 id="modal-title" class="text-base font-black text-slate-800">費目明細</h3>
          <p id="modal-subtitle" class="text-xs text-slate-400 font-bold mt-0.5">0件の支出</p>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-slate-200/60 active:scale-90 text-slate-500 rounded-full font-bold transition-transform">✕</button>
      </div>
      <div id="modal-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50"></div>
    </div>
  </div>

  <div id="scan-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="fixed inset-0 bg-black/60 backdrop-blur-xs"></div>
    <div class="relative bg-white w-full sm:max-w-md max-h-[85vh] sm:rounded-2xl rounded-t-2xl shadow-xl flex flex-col overflow-hidden animate-slide-up">
      <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h3 class="text-base font-black text-slate-800">撮影したレシートの解析</h3>
        <button onclick="closeScanModal()" class="w-8 h-8 flex items-center justify-center bg-slate-200/60 text-slate-500 rounded-full font-bold">✕</button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 space-y-4 text-center">
        <p class="text-xs text-slate-400 font-bold text-left">※長いレシートは「追加撮影」で複数に分けてプールできます。</p>
        <div id="image-preview-container" class="grid grid-cols-3 gap-3"></div>
        
        <div id="scan-status" class="hidden py-4 space-y-2">
          <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
          <p class="text-sm font-black text-indigo-600 animate-pulse">Geminiがレシートを解析しています...</p>
          <p class="text-[11px] text-slate-400 font-medium">（3〜7秒ほどかかります。閉じずにお待ちください）</p>
        </div>
      </div>
      <div id="scan-actions" class="p-4 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-3">
        <button onclick="triggerCamera()" class="bg-white border border-slate-200 text-slate-700 py-3.5 rounded-xl font-bold text-xs active:scale-95 transition-transform">＋ 続きを追加撮影</button>
        <button onclick="startOcrAnalysis()" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 rounded-xl font-black text-xs active:scale-95 transition-transform shadow-md">⚡ 解析を開始する</button>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div class="fixed inset-0 bg-black/60 backdrop-blur-xs"></div>
    <div class="relative bg-white w-full sm:max-w-md h-[90vh] sm:h-[85vh] sm:rounded-2xl rounded-t-2xl shadow-xl flex flex-col overflow-hidden animate-slide-up">
      <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <div>
          <h3 class="text-base font-black text-slate-800">解析結果の確認・修正</h3>
          <p class="text-[10px] text-amber-600 font-bold mt-0.5">⚠️ 間違いがあれば修正して登録してください</p>
        </div>
      </div>
      
      <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50/30">
        <div class="bg-white p-4 rounded-xl border border-slate-100 space-y-3 shadow-2xs">
          <div>
            <label class="text-[11px] font-black text-slate-400 block mb-1">店舗名</label>
            <input type="text" id="form-shop" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-blue-500 font-bold">
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-[11px] font-black text-slate-400 block mb-1">日付</label>
              <input type="date" id="form-date" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 font-bold">
            </div>
            <div>
              <label class="text-[11px] font-black text-slate-400 block mb-1">時刻</label>
              <input type="time" id="form-time" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 font-bold">
            </div>
          </div>
          <div>
            <label class="text-[11px] font-black text-slate-400 block mb-1">支出分類（予算紐付け）</label>
            <select id="form-category" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 font-black text-slate-700">
              <option value="1食費">1食費</option>
              <option value="2外食費">2外食費</option>
              <option value="3日用品費">3日用品費</option>
              <option value="4交通費">4交通費</option>
              <option value="5通信費">5通信費</option>
              <option value="6光熱費">6光熱費</option>
              <option value="7美容医療費">7美容医療費</option>
              <option value="8趣味交際費">8趣味交際費</option>
              <option value="9雑費">9雑費</option>
            </select>
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <span class="text-xs font-black text-slate-500">購入商品内訳明細</span>
            <button onclick="addFormItemRow('', 0)" class="text-[11px] font-black text-blue-600 bg-blue-50 px-2.5 py-1 rounded-lg">＋ 行を追加</button>
          </div>
          <div id="form-items-container" class="space-y-2"></div>
        </div>
      </div>

      <div id="edit-actions" class="p-4 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-3">
        <button onclick="closeEditModal()" class="bg-white border border-slate-200 text-slate-500 py-3.5 rounded-xl font-bold text-xs active:scale-95">破棄して戻る</button>
        <button onclick="submitFinalDataToSheet()" id="btn-submit-sheet" class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white py-3.5 rounded-xl font-black text-xs active:scale-95 shadow-md flex justify-center items-center space-x-1">
          <span>🚀 シートに直接登録</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    // ⚙️ 稼働中の本番用GAS URL (大文字のIを完全保持)
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3Ecc0JvebfweIZuabqgUBzuz679L51TL_IVQ4yes8JmnjOqo953T_DTjynUWkHfUS/exec";

    let serverPackageData = null;
    let currentView = 'current'; 
    let selectedImageBase64Array = []; // プールされた画像配列

    let touchStartX = 0;
    let touchStartY = 0;

    function formatVND(value) {
      return new Intl.NumberFormat('ja-JP').format(Math.round(value)) + ' VND';
    }

    async function fetchData() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-msg');
      const summaryEl = document.getElementById('summary-card');
      const listEl = document.getElementById('category-list');

      loadingEl.classList.remove('hidden');
      errorEl.classList.add('hidden');
      summaryEl.classList.add('hidden');
      listEl.innerHTML = '';

      try {
        const sanitizedUrl = GAS_API_URL.replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
        const response = await fetch(sanitizedUrl, { method: "GET", redirect: "follow" });
        if (!response.ok) throw new Error('ネットワークエラーが発生しました。');
        
        serverPackageData = await response.json();
        if (serverPackageData.error) throw new Error(serverPackageData.error);
        
        renderDashboard();

      } catch (err) {
        loadingEl.classList.add('hidden');
        errorEl.innerText = err.message;
        errorEl.classList.remove('hidden');
      }
    }

    function renderDashboard() {
      if (!serverPackageData) return;

      const loadingEl = document.getElementById('loading');
      const summaryEl = document.getElementById('summary-card');
      const listEl = document.getElementById('category-list');
      const monthEl = document.getElementById('app-month');
      const titleEl = document.getElementById('summary-title');
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');

      listEl.innerHTML = '';
      loadingEl.classList.add('hidden');
      summaryEl.classList.remove('hidden');

      const targetData = serverPackageData[currentView];
      
      if (currentView === 'current') {
        btnNext.classList.add('opacity-40');
        btnPrev.classList.remove('opacity-40');
        titleEl.innerText = "今月の残り予算";
      } else {
        btnNext.classList.remove('opacity-40');
        btnPrev.classList.add('opacity-40');
        titleEl.innerText = "先月の残り予算";
      }

      let formattedMonth = targetData.ym;
      if (formattedMonth.includes('GMT') || !isNaN(Date.parse(formattedMonth))) {
        const dObj = new Date(formattedMonth);
        if (!isNaN(dObj.getTime())) {
          formattedMonth = `${dObj.getFullYear()}-${('0' + (dObj.getMonth() + 1)).slice(-2)}`;
        }
      }
      monthEl.innerText = `${formattedMonth} ${currentView === 'current' ? '今月' : '先月'}`;

      let totalBudget = 0;
      let totalActual = 0;

      targetData.summary.forEach(item => {
        totalBudget += item.budget;
        totalActual += item.actual;

        const ratePercent = Math.min((item.rate * 100), 100).toFixed(1);
        const rawPercent = (item.rate * 100).toFixed(1);

        let barColor = 'bg-blue-500';
        let textColor = 'text-blue-600';
        if (item.rate >= 1.0) {
          barColor = 'bg-red-500 animate-pulse';
          textColor = 'text-red-600';
        } else if (item.rate >= 0.9) {
          barColor = 'bg-amber-500';
          textColor = 'text-amber-600';
        }

        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-xl shadow-xs border border-slate-100 space-y-2 cursor-pointer active:bg-slate-50 transition-colors select-none';
        card.onclick = () => openModal(item.category);
        
        card.innerHTML = `
          <div class="flex justify-between items-baseline">
            <span class="font-black text-slate-700 text-sm">${item.category}</span>
            <span class="text-xs font-bold text-slate-400">${formatVND(item.actual)} / ${formatVND(item.budget)}</span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
            <div class="${barColor} h-3 rounded-full" style="width: ${ratePercent}%"></div>
          </div>
          <div class="flex justify-between items-center mt-0.5">
            <span class="text-[10px] font-bold text-slate-300 tracking-tight">📊 タップで詳細内訳を表示</span>
            <span class="text-right text-xs ${textColor} font-black">${rawPercent}% 消化</span>
          </div>
        `;
        listEl.appendChild(card);
      });

      const remaining = totalBudget - totalActual;
      const remainEl = document.getElementById('remaining-budget');
      
      remainEl.innerText = formatVND(remaining);
      remainEl.className = remaining < 0 ? 'text-3xl font-black tracking-tight text-red-600' : 'text-3xl font-black tracking-tight text-emerald-600';

      document.getElementById('total-budget').innerText = formatVND(totalBudget);
      document.getElementById('total-actual').innerText = formatVND(totalActual);
    }

    function switchView(viewName) {
      if (currentView === viewName) return;
      currentView = viewName;
      renderDashboard();
    }

    // ===== 📸 カメラ起動と複数画像管理ロジック =====
    function triggerCamera() {
      document.getElementById('camera-input').click();
    }

    function handleImagesSelected(event) {
      const files = event.target.target || event.target.files;
      if (!files || files.length === 0) return;

      document.getElementById('scan-modal').classList.remove('hidden');

      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const base64String = e.target.result;
          selectedImageBase64Array.push(base64String);
          renderThumbnails();
        };
        reader.readAsDataURL(file);
      });
      event.target.value = ''; // インプットのリセット
    }

    function renderThumbnails() {
      const container = document.getElementById('image-preview-container');
      container.innerHTML = '';
      
      selectedImageBase64Array.forEach((base64, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'relative aspect-square rounded-xl overflow-hidden border border-slate-200 bg-slate-100';
        wrapper.innerHTML = `
          <img src="${base64}" class="w-full h-full object-cover">
          <button onclick="removeImageFromPool(${index})" class="absolute top-1 right-1 w-5 h-5 bg-black/70 text-white rounded-full flex items-center justify-center text-[10px] font-bold">✕</button>
        `;
        container.appendChild(wrapper);
      });
    }

    function removeImageFromPool(index) {
      selectedImageBase64Array.splice(index, 1);
      renderThumbnails();
      if (selectedImageBase64Array.length === 0) closeScanModal();
    }

    function closeScanModal() {
      document.getElementById('scan-modal').classList.add('hidden');
      document.getElementById('scan-status').classList.add('hidden');
      document.getElementById('scan-actions').classList.remove('hidden');
      selectedImageBase64Array = [];
    }

    // ===== ⚡ Gemini API (GAS doPost) への解析要求処理 =====
    async function startOcrAnalysis() {
      if (selectedImageBase64Array.length === 0) return;

      document.getElementById('scan-status').classList.remove('hidden');
      document.getElementById('scan-actions').classList.add('hidden');

      try {
        const sanitizedUrl = GAS_API_URL.replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
        
        // 🚀 画像パッケージをPOST送信
        const response = await fetch(sanitizedUrl, {
          method: "POST",
          redirect: "follow",
          body: JSON.stringify({
            action: "analyze_receipt",
            images: selectedImageBase64Array
          })
        });

        if (!response.ok) throw new Error("サーバーでの解析に失敗しました。");
        const result = await response.json();
        
        if (result.error) throw new Error(result.error);

        // 解析成功 ➔ 確認編集フォームへデータを流し込む
        document.getElementById('scan-modal').classList.add('hidden');
        openEditModal(result);

      } catch (err) {
        alert("解析エラー: " + err.message);
        document.getElementById('scan-status').classList.add('hidden');
        document.getElementById('scan-actions').classList.remove('hidden');
      }
    }

    // ===== 📝 確認・手動修正フォームフォームの制御窓口 =====
    function openEditModal(data) {
      document.getElementById('edit-modal').classList.remove('hidden');
      
      // 各入力枠に初期値をセット
      document.getElementById('form-shop').value = data.shop || "不明な店舗";
      document.getElementById('form-date').value = data.date || new Date().toISOString().split('T')[0];
      document.getElementById('form-time').value = data.time || "00:00";
      document.getElementById('form-category').value = data.category || "1食費";

      const itemContainer = document.getElementById('form-items-container');
      itemContainer.innerHTML = '';

      if (data.items && data.items.length > 0) {
        data.items.forEach(item => {
          addFormItemRow(item.name, item.price);
        });
      } else {
        addFormItemRow('', 0);
      }
    }

    function addFormItemRow(name, price) {
      const container = document.getElementById('form-items-container');
      const row = document.createElement('div');
      row.className = 'flex items-center space-x-2 bg-white p-2.5 rounded-xl border border-slate-100 shadow-3xs item-row';
      row.innerHTML = `
        <input type="text" value="${name}" placeholder="商品名" class="flex-1 px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-none item-name font-medium">
        <input type="number" value="${Math.round(price)}" placeholder="金額" class="w-24 px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-none item-price font-bold text-right">
        <button onclick="this.parentElement.remove()" class="text-slate-300 hover:text-red-500 text-xs font-bold px-1.5">✕</button>
      `;
      container.appendChild(row);
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.add('hidden');
      closeScanModal();
    }

    // ===== 🚀 修正後の最終データをスプレッドシートの末尾に書き込み！ =====
    async function submitFinalDataToSheet() {
      const btn = document.getElementById('btn-submit-sheet');
      
      const shop = document.getElementById('form-shop').value.trim();
      const date = document.getElementById('form-date').value;
      const time = document.getElementById('form-time').value;
      const category = document.getElementById('form-category').value;

      const itemRows = document.querySelectorAll('.item-row');
      const items = [];

      itemRows.forEach(row => {
        const name = row.querySelector('.item-name').value.trim();
        const price = parseFloat(row.querySelector('.item-price').value) || 0;
        if (name) items.push({ name, price });
      });

      if (!shop || items.length === 0) {
        alert("店舗名および購入商品を入力してください。");
        return;
      }

      // ローディング状態へ切り替え
      btn.disabled = true;
      btn.innerHTML = `<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div><span>登録中...</span>`;

      try {
        const sanitizedUrl = GAS_API_URL.replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
        const response = await fetch(sanitizedUrl, {
          method: "POST",
          redirect: "follow",
          body: JSON.stringify({
            action: "save_receipt",
            data: { shop, date, time, category, items }
          })
        });

        if (!response.ok) throw new Error("シートへの登録に失敗しました。");
        const res = await response.json();
        if (res.error) throw new Error(res.error);

        // 登録完了！➔ 画面を閉じてダッシュボードを最新状態に再リロード
        alert("スプレッドシートへ正常に自動登録されました！");
        closeEditModal();
        fetchData();

      } catch (err) {
        alert("登録エラー: " + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<span>🚀 シートに直接登録</span>`;
      }
    }

    // ===== 💬 グルーピング詳細ポップアップの制御 =====
    function openModal(category) {
      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('modal-title');
      const subtitle = document.getElementById('modal-subtitle');
      const body = document.getElementById('modal-body');

      title.innerText = `${category} の詳細明細`;
      body.innerHTML = '';

      const activeDetails = serverPackageData[currentView].details || [];
      const targetDetails = activeDetails.filter(d => d.category === category);
      subtitle.innerText = `合計 ${targetDetails.length} 件のお買い物`;

      if (targetDetails.length === 0) {
        body.innerHTML = `<div class="text-center py-12 text-slate-400 font-medium text-sm">この月の明細はありません。</div>`;
      } else {
        targetDetails.forEach((receipt, index) => {
          const itemBox = document.createElement('div');
          itemBox.className = 'bg-white rounded-xl border border-slate-100 overflow-hidden shadow-2xs';
          
          const itemsHtml = receipt.items.map(it => {
            const splitIdx = it.lastIndexOf(' (');
            const itemName = splitIdx !== -1 ? it.substring(0, splitIdx) : it;
            const itemPrice = splitIdx !== -1 ? it.substring(splitIdx + 2, it.length - 1) : '';
            return `
              <li class="flex justify-between items-start text-xs py-2 border-b border-dashed border-slate-100 last:border-0 text-slate-600">
                <span class="pr-3 font-medium text-left break-all text-slate-600">${itemName}</span>
                <span class="font-bold text-slate-500 shrink-0 tracking-tight">${itemPrice ? itemPrice + ' ₫' : ''}</span>
              </li>
            `;
          }).join('');

          itemBox.innerHTML = `
            <div onclick="toggleAccordion(${index})" class="p-3.5 flex justify-between items-center cursor-pointer active:bg-slate-50 transition-colors select-none">
              <div class="space-y-0.5 text-left pr-2">
                <div class="text-xs font-black text-slate-700 leading-tight">${receipt.shop}</div>
                <div class="text-[10px] font-bold text-slate-400 tracking-tight">${receipt.date} ${receipt.time}</div>
              </div>
              <div class="flex items-center space-x-2 shrink-0">
                <span class="text-sm font-black text-slate-800">${formatVND(receipt.totalAmount)}</span>
                <span id="arrow-${index}" class="text-[9px] text-slate-400 font-bold transition-transform duration-200">▼</span>
              </div>
            </div>
            <div id="body-${index}" class="hidden bg-slate-50/60 px-4 py-2 border-t border-slate-100 border-dashed animate-fade-in">
              <ul class="divide-y divide-dashed divide-slate-100">${itemsHtml}</ul>
            </div>
          `;
          body.appendChild(itemBox);
        });
      }

      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('detail-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    function toggleAccordion(index) {
      const body = document.getElementById(`body-${index}`);
      const arrow = document.getElementById(`arrow-${index}`);
      if (body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        arrow.style.transform = 'rotate(180deg)';
      } else {
        body.classList.add('hidden');
        arrow.style.transform = 'rotate(0deg)';
      }
    }

    // ===== 📱 左右スワイプジェスチャの検知ロジック =====
    const swipeArea = document.getElementById('swipe-area');

    swipeArea.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    swipeArea.addEventListener('touchend', (e) => {
      const touchEndX = e.changedTouches[0].screenX;
      const touchEndY = e.changedTouches[0].screenY;
      
      const diffX = touchEndX - touchStartX;
      const diffY = touchEndY - touchStartY;

      if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 70) {
        if (diffX > 0) {
          switchView('last');
        } else {
          switchView('current');
        }
      }
    }, { passive: true });

    // 初回起動時実行
    fetchData();
  </script>
</body>
</html>

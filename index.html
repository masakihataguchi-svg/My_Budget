<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

  <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white sticky top-0 z-50 shadow-md px-4 pt-4 pb-4 rounded-b-2xl">
    <div class="flex justify-between items-center max-w-md mx-auto">
      <div>
        <h1 class="text-xl font-black tracking-tight">家計簿</h1>
        <p id="app-month" class="text-xs text-blue-100 font-medium">読み込み中...</p>
      </div>
      <button onclick="fetchData()" class="p-2 bg-white/20 rounded-xl active:scale-95 transition-transform" aria-label="更新">
        🔄
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">

    <div id="loading" class="text-center py-12 text-slate-400 font-medium animate-pulse">
      データを取得しています...
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl text-sm font-semibold shadow-sm text-center"></div>

    <div id="summary-card" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">今月の残り予算</h2>
      <div id="remaining-budget" class="text-3xl font-black tracking-tight text-slate-900 transition-colors">0 VND</div>
      <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-50">
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">総予算</span>
          <span id="total-budget" class="text-base font-extrabold text-slate-700">0</span>
        </div>
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">実支出</span>
          <span id="total-actual" class="text-base font-extrabold text-slate-700">0</span>
        </div>
      </div>
    </div>

    <div id="category-list" class="space-y-3"></div>

  </main>

  <div id="detail-modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div onclick="closeModal()" class="fixed inset-0 bg-black/60 backdrop-blur-xs"></div>
    
    <div class="relative bg-white w-full sm:max-w-md h-[80vh] sm:h-[70vh] sm:rounded-2xl rounded-t-2xl shadow-xl flex flex-col overflow-hidden animate-slide-up sm:animate-fade-in">
      <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <div>
          <h3 id="modal-title" class="text-base font-black text-slate-800">費目明細</h3>
          <p id="modal-subtitle" class="text-xs text-slate-400 font-bold mt-0.5">0件の支出</p>
        </div>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center bg-slate-200/60 active:scale-90 text-slate-500 rounded-full font-bold transition-transform">
          ✕
        </button>
      </div>
      
      <div id="modal-body" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50">
        </div>
    </div>
  </div>

  <style>
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-slide-up {
      animation: slideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }
  </style>

  <script>
    // ⚙️ タイポを修正した、寸分の狂いもない完全なGASウェブアプリURL
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3Ecc0JvebfweIZuabqgUBzuz679L51TL_IVQ4yes8JmnjOqo953T_DTjynUWkHfUS/exec";

    // 明細データをフロント側に保持するキャッシュ配列
    let cachedDetails = [];

    // 通貨フォーマット関数
    function formatVND(value) {
      return new Intl.NumberFormat('ja-JP').format(Math.round(value)) + ' VND';
    }

    async function fetchData() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-msg');
      const summaryEl = document.getElementById('summary-card');
      const listEl = document.getElementById('category-list');
      const monthEl = document.getElementById('app-month');

      loadingEl.classList.remove('hidden');
      errorEl.classList.add('hidden');
      summaryEl.classList.add('hidden');
      listEl.innerHTML = '';

      try {
        const response = await fetch(GAS_API_URL);
        if (!response.ok) throw new Error('ネットワークエラーが発生しました。');
        
        const responseData = await response.json();
        if (responseData.error) throw new Error(responseData.error);
        
        // パッケージデータを分解
        const summary = responseData.summary || [];
        cachedDetails = responseData.details || [];

        if (summary.length === 0) {
          monthEl.innerText = "データなし";
          throw new Error('今月の有効なデータが Budget_Master に見つかりません。');
        }

        loadingEl.classList.add('hidden');
        summaryEl.classList.remove('hidden');

        // ===== 🕒 ヘッダーの日付表記を綺麗に整える =====
        const rawMonth = summary[0].month;
        let formattedMonth = rawMonth;

        if (rawMonth.includes('GMT') || !isNaN(Date.parse(rawMonth))) {
          const dateObj = new Date(rawMonth);
          if (!isNaN(dateObj.getTime())) {
            const y = dateObj.getFullYear();
            const m = ('0' + (dateObj.getMonth() + 1)).slice(-2);
            formattedMonth = `${y}-${m}`; 
          }
        } else {
          const match = rawMonth.match(/(\d{4})[-/](\d{1,2})/);
          if (match) {
            formattedMonth = `${match[1]}-${('0' + match[2]).slice(-2)}`;
          }
        }
        monthEl.innerText = `${formattedMonth} 予算状況`;

        let totalBudget = 0;
        let totalActual = 0;

        // 費目別リスト（プログレスバー）の生成
        summary.forEach(item => {
          totalBudget += item.budget;
          totalActual += item.actual;

          const ratePercent = Math.min((item.rate * 100), 100).toFixed(1);
          const rawPercent = (item.rate * 100).toFixed(1);

          let barColor = 'bg-blue-500';
          let textColor = 'text-blue-600';
          if (item.rate >= 1.0) {
            barColor = 'bg-red-500 animate-pulse';
            textColor = 'text-red-600';
          } else if (item.rate >= 0.9) {
            barColor = 'bg-amber-500';
            textColor = 'text-amber-600';
          }

          const card = document.createElement('div');
          card.className = 'bg-white p-4 rounded-xl shadow-xs border border-slate-100 space-y-2 cursor-pointer active:bg-slate-50 transition-colors select-none';
          card.onclick = () => openModal(item.category);
          
          card.innerHTML = `
            <div class="flex justify-between items-baseline">
              <span class="font-black text-slate-700 text-sm">${item.category}</span>
              <span class="text-xs font-bold text-slate-400">${formatVND(item.actual)} / ${formatVND(item.budget)}</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
              <div class="${barColor} h-3 rounded-full" style="width: ${ratePercent}%"></div>
            </div>
            <div class="flex justify-between items-center mt-0.5">
              <span class="text-[10px] font-bold text-slate-300 tracking-tight">📊 タップで支出内訳を表示</span>
              <span class="text-right text-xs ${textColor} font-black">${rawPercent}% 消化</span>
            </div>
          `;
          listEl.appendChild(card);
        });

        // 概要情報の計算とセット
        const remaining = totalBudget - totalActual;
        const remainEl = document.getElementById('remaining-budget');
        
        remainEl.innerText = formatVND(remaining);
        if (remaining < 0) {
          remainEl.className = 'text-3xl font-black tracking-tight text-red-600';
        } else {
          remainEl.className = 'text-3xl font-black tracking-tight text-emerald-600';
        }

        document.getElementById('total-budget').innerText = formatVND(totalBudget);
        document.getElementById('total-actual').innerText = formatVND(totalActual);

      } catch (err) {
        loadingEl.classList.add('hidden');
        errorEl.innerText = err.message;
        errorEl.classList.remove('hidden');
      }
    }

    // ===== 💬 グルーピング明細モーダルの制御窓口 =====
    function openModal(category) {
      const modal = document.getElementById('detail-modal');
      const title = document.getElementById('modal-title');
      const subtitle = document.getElementById('modal-subtitle');
      const body = document.getElementById('modal-body');

      title.innerText = `${category} の今月明細`;
      body.innerHTML = '';

      const targetDetails = cachedDetails.filter(d => d.category === category);
      subtitle.innerText = `合計 ${targetDetails.length} 件のお買い物`;

      if (targetDetails.length === 0) {
        body.innerHTML = `<div class="text-center py-12 text-slate-400 font-medium text-sm">今月の支出明細はありません。</div>`;
      } else {
        targetDetails.forEach((receipt, index) => {
          const itemBox = document.createElement('div');
          itemBox.className = 'bg-white rounded-xl border border-slate-100 overflow-hidden shadow-2xs';
          
          const itemsHtml = receipt.items.map(it => {
            const splitIdx = it.lastIndexOf(' (');
            const itemName = splitIdx !== -1 ? it.substring(0, splitIdx) : it;
            const itemPrice = splitIdx !== -1 ? it.substring(splitIdx + 2, it.length - 1) : '';
            
            return `
              <li class="flex justify-between items-start text-xs py-2 border-b border-dashed border-slate-100 last:border-0 text-slate-600">
                <span class="pr-3 font-medium text-left break-all text-slate-600">${itemName}</span>
                <span class="font-bold text-slate-500 shrink-0 tracking-tight">${itemPrice ? itemPrice + ' ₫' : ''}</span>
              </li>
            `;
          }).join('');

          itemBox.innerHTML = `
            <div onclick="toggleAccordion(${index})" class="p-3.5 flex justify-between items-center cursor-pointer active:bg-slate-50 transition-colors select-none">
              <div class="space-y-0.5 text-left pr-2">
                <div class="text-xs font-black text-slate-700 leading-tight">${receipt.shop}</div>
                <div class="text-[10px] font-bold text-slate-400 tracking-tight">${receipt.date} ${receipt.time}</div>
              </div>
              <div class="flex items-center space-x-2 shrink-0">
                <span class="text-sm font-black text-slate-800">${formatVND(receipt.totalAmount)}</span>
                <span id="arrow-${index}" class="text-[9px] text-slate-400 font-bold transition-transform duration-200">▼</span>
              </div>
            </div>
            
            <div id="body-${index}" class="hidden bg-slate-50/60 px-4 py-2 border-t border-slate-100 border-dashed animate-fade-in">
              <ul class="divide-y divide-dashed divide-slate-100">
                ${itemsHtml}
              </ul>
            </div>
          `;
          body.appendChild(itemBox);
        });
      }

      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('detail-modal');
      modal.classList.add('hidden');
      document.body.style.overflow = '';
    }

    function toggleAccordion(index) {
      const body = document.getElementById(`body-${index}`);
      const arrow = document.getElementById(`arrow-${index}`);
      
      if (body.classList.contains('hidden')) {
        body.classList.remove('hidden');
        arrow.style.transform = 'rotate(180deg)';
      } else {
        body.classList.add('hidden');
        arrow.style.transform = 'rotate(0deg)';
      }
    }

    // 初回起動時実行
    fetchData();
  </script>
</body>
</html>

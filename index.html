<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <title>家計簿ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

  <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white sticky top-0 z-50 shadow-md px-4 pt-4 pb-4 rounded-b-2xl">
    <div class="flex justify-between items-center max-w-md mx-auto">
      <div>
        <h1 class="text-xl font-black tracking-tight">家計簿</h1>
        <p id="app-month" class="text-xs text-blue-100 font-medium">読み込み中...</p>
      </div>
      <button onclick="fetchData()" class="p-2 bg-white/20 rounded-xl active:scale-95 transition-transform" aria-label="更新">
        🔄
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-4">

    <div id="loading" class="text-center py-12 text-slate-400 font-medium animate-pulse">
      データを取得しています...
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 p-4 rounded-xl text-sm font-semibold shadow-sm text-center"></div>

    <div id="summary-card" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-1">今月の残り予算</h2>
      <div id="remaining-budget" class="text-3xl font-black tracking-tight text-slate-900 transition-colors">0 VND</div>
      <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-50">
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">総予算</span>
          <span id="total-budget" class="text-base font-extrabold text-slate-700">0</span>
        </div>
        <div>
          <span class="text-xs font-bold text-slate-400 block mb-0.5">実支出</span>
          <span id="total-actual" class="text-base font-extrabold text-slate-700">0</span>
        </div>
      </div>
    </div>

    <div id="category-list" class="space-y-3"></div>

  </main>

  <script>
    // ⚠️ ここにあなたのGASウェブアプリURLを貼り付けてください
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbx3EccOJvebfweIZuabqgUBzuz679L51TL_IVQ4yes8JmnjOqo953T_DTjynUWkHfUS/exec";

    // 通貨フォーマット関数
    function formatVND(value) {
      return new Intl.NumberFormat('ja-JP').format(Math.round(value)) + ' VND';
    }

    async function fetchData() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error-msg');
      const summaryEl = document.getElementById('summary-card');
      const listEl = document.getElementById('category-list');
      const monthEl = document.getElementById('app-month');

      loadingEl.classList.remove('hidden');
      errorEl.classList.add('hidden');
      summaryEl.classList.add('hidden');
      listEl.innerHTML = '';

      try {
        const response = await fetch(GAS_API_URL);
        if (!response.ok) throw new Error('ネットワークエラーが発生しました。');
        
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        if (data.length === 0) {
          monthEl.innerText = "データなし";
          throw new Error('今月の有効なデータが Budget_Master に見つかりません。');
        }

        loadingEl.classList.add('hidden');
        summaryEl.classList.remove('hidden');

        // ヘッダー情報セット
        monthEl.innerText = `${data[0].month} 予算状況`;

        let totalBudget = 0;
        let totalActual = 0;

        // 費目別進捗バーの組み立て
        data.forEach(item => {
          totalBudget += item.budget;
          totalActual += item.actual;

          const ratePercent = Math.min((item.rate * 100), 100).toFixed(1);
          const rawPercent = (item.rate * 100).toFixed(1);

          // 消化率に応じたプログレスバーの色決定
          let barColor = 'bg-blue-500';
          let textColor = 'text-blue-600';
          if (item.rate >= 1.0) {
            barColor = 'bg-red-500 animate-pulse';
            textColor = 'text-red-600';
          } else if (item.rate >= 0.9) {
            barColor = 'bg-amber-500';
            textColor = 'text-amber-600';
          }

          const card = document.createElement('div');
          card.className = 'bg-white p-4 rounded-xl shadow-xs border border-slate-100 space-y-2';
          card.innerHTML = `
            <div class="flex justify-between items-baseline">
              <span class="font-black text-slate-700 text-sm">${item.category}</span>
              <span class="text-xs font-bold text-slate-400">${formatVND(item.actual)} / ${formatVND(item.budget)}</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
              <div class="${barColor} h-3 rounded-full" style="width: ${ratePercent}%"></div>
            </div>
            <div class="text-right text-xs ${textColor} font-black">${rawPercent}% 消化</div>
          `;
          listEl.appendChild(card);
        });

        // 概要情報の計算とセット
        const remaining = totalBudget - totalActual;
        const remainEl = document.getElementById('remaining-budget');
        
        remainEl.innerText = formatVND(remaining);
        if (remaining < 0) {
          remainEl.className = 'text-3xl font-black tracking-tight text-red-600';
        } else {
          remainEl.className = 'text-3xl font-black tracking-tight text-emerald-600';
        }

        document.getElementById('total-budget').innerText = formatVND(totalBudget);
        document.getElementById('total-actual').innerText = formatVND(totalActual);

      } catch (err) {
        loadingEl.classList.add('hidden');
        errorEl.innerText = err.message;
        errorEl.classList.remove('hidden');
      }
    }

    // 初回起動時実行
    fetchData();
  </script>
</body>
</html>
